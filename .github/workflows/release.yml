name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch/minor/major → npm latest; prerelease → beta/rc tag)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      pre_release_channel:
        description: 'Pre-release channel (used only when release type is prerelease)'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - rc
      dry_run:
        description: 'Dry run (no commit, tag, publish, or GitHub release)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (${{ inputs.release_type }}${{ inputs.release_type == 'prerelease' && format('-{0}', inputs.pre_release_channel) || '' }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set"
            exit 1
          fi
          rm -f .npmrc
          {
            echo "registry=https://registry.npmjs.org/"
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
          } >> "$HOME/.npmrc"

      - name: Typecheck
        run: yarn typecheck

      - name: Build Package
        run: yarn prepare

      - name: Verify npm publish access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set"
            exit 1
          fi
          echo "npm user: $(npm whoami --registry=https://registry.npmjs.org)"
          npm access list collaborators rn-incoming-call-nitro --registry=https://registry.npmjs.org

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure release version is not already on npm
        if: ${{ inputs.dry_run == false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          rm -f .npmrc

          if [ "${{ inputs.release_type }}" = "prerelease" ]; then
            TARGET=$(yarn release prerelease --release-version --npm.skipChecks \
              --preReleaseId=${{ inputs.pre_release_channel }} | tail -1)
          else
            TARGET=$(yarn release ${{ inputs.release_type }} --release-version --npm.skipChecks | tail -1)
          fi

          echo "Planned release version: ${TARGET}"

          if npm view "${PKG}@${TARGET}" version --registry=https://registry.npmjs.org 2>/dev/null | grep -qx "${TARGET}"; then
            echo "::error::Version ${TARGET} is already on npm — publish would fail."
            echo "::error::Bump package.json in git to match npm, or use patch/minor/major for the next version."
            echo "::error::If only git/tag is missing, run: yarn release ${TARGET} --ci --no-increment --no-npm.publish"
            exit 1
          fi

      - name: Release stable (dry run)
        if: ${{ inputs.dry_run == true && inputs.release_type != 'prerelease' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release ${{ inputs.release_type }} --dry-run --npm.skipChecks --npm.tag=latest

      - name: Release pre-release (dry run)
        if: ${{ inputs.dry_run == true && inputs.release_type == 'prerelease' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          yarn release prerelease
          --dry-run
          --npm.skipChecks
          --npm.tag=${{ inputs.pre_release_channel }}
          --preReleaseId=${{ inputs.pre_release_channel }}
          --github.preRelease

      - name: Release stable (production)
        if: ${{ inputs.dry_run == false && inputs.release_type != 'prerelease' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f .npmrc
          yarn release ${{ inputs.release_type }} --ci --npm.skipChecks --npm.tag=latest

      - name: Release pre-release (production)
        if: ${{ inputs.dry_run == false && inputs.release_type == 'prerelease' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f .npmrc
          yarn release prerelease \
            --ci \
            --npm.skipChecks \
            --npm.tag=${{ inputs.pre_release_channel }} \
            --preReleaseId=${{ inputs.pre_release_channel }} \
            --github.preRelease
